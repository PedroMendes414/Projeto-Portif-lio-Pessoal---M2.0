name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API test suite
        run: npm run test:ci

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-report-node-${{ matrix.node-version }}
          path: reports/api
          if-no-files-found: ignore
          retention-days: 7

  publish-report:
    name: Publish Mochawesome report
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check GitHub Pages configuration
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status_code=$(curl --silent --show-error --output /tmp/pages.json --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${status_code}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          {
            echo "## GitHub Pages nao configurado"
            echo ""
            echo "Os testes passaram e o relatorio foi salvo como artifact, mas o deploy visual foi pulado porque o GitHub Pages ainda nao esta habilitado para este repositorio."
            echo ""
            echo "Para habilitar: Settings > Pages > Build and deployment > Source > GitHub Actions."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Configure GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6

      - name: Download Node.js 22 report
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          name: api-test-report-node-22.x
          path: pages-report

      - name: Upload report to GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-report

      - name: Deploy report to GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
